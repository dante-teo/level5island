name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Build DMG
        run: ./scripts/build-dmg.sh ${{ steps.version.outputs.VERSION }}

      - name: Compute SHA256
        id: sha
        run: |
          SHA=$(shasum -a 256 .build/CodeIsland.dmg | awk '{print $1}')
          echo "SHA256=$SHA" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: CodeIsland v${{ steps.version.outputs.VERSION }}
          body: |
            ## CodeIsland v${{ steps.version.outputs.VERSION }}

            ### Install via Homebrew
            ```bash
            brew tap dante-teo/tap
            brew install --cask codeisland
            ```

            ### Manual Install
            Download `CodeIsland.dmg` below, open it, and drag CodeIsland to Applications.

            > **Note:** This app is not notarized. Run `xattr -cr /Applications/CodeIsland.app` if macOS blocks it.
          files: .build/CodeIsland.dmg
          draft: false
          prerelease: false

      - name: Update Homebrew cask
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          git clone https://x-access-token:${TAP_TOKEN}@github.com/dante-teo/homebrew-tap.git /tmp/homebrew-tap
          cd /tmp/homebrew-tap

          sed -i '' "s/version \".*\"/version \"${{ steps.version.outputs.VERSION }}\"/" Casks/codeisland.rb
          sed -i '' "s/sha256 \".*\"/sha256 \"${{ steps.sha.outputs.SHA256 }}\"/" Casks/codeisland.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/codeisland.rb
          git commit -m "Update codeisland to ${{ steps.version.outputs.VERSION }}"
          git push
